<div class="container">

<div class="card">

<h2>Anfahrt</h2>

<div class="info-box">

<p>
<b>Wichtiger Hinweis</b><br><br>

Die Zufahrt zum Flugplatz ist ausschließlich über den
<b>Rethstellredder</b> erlaubt.<br>
Eine Anfahrt über den <b>Seehof</b> ist nicht gestattet.
</p>

<input id="start" placeholder="Startadresse eingeben">

<button onclick="route()">
Route planen
</button>

</div>


<!-- GOOGLE MAPS BOX -->
<div class="info-box">

<p><b>Standort Flugplatz</b></p>

<iframe
src="https://www.google.com/maps?q=54.2172239,10.2441977&output=embed">
</iframe>

</div>

</div>

</div>


<script>

function route(){

let start =
document.getElementById("start").value;

if(!start){
alert("Bitte Startadresse eingeben");
return;
}

window.open(
"https://www.google.com/maps/dir/?api=1&origin="
+ encodeURIComponent(start)
+ "&destination=54.2172239,10.2441977"
);

}

</script>
